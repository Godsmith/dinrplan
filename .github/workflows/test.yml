name: Test
on: [push]
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: mysecretkey
      # Loaded in settings.py to set database configuration
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1/github_actions
      # Disables SSL for the database in settings.py
      ENV: development
    services:
      postgres:
        image: postgres:14.1
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: github_actions
        ports:
          - 5432:5432
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python 3.13
      uses: actions/setup-python@v1
      with:
        python-version: "3.13"
    - name: Install prerequisites for psycopg2
      run: sudo apt-get install libpq-dev
    - name: Install dependencies
      run: |
        pip install uv
        uv sync
    - name: Install playwright
      run: uv run playwright install
    - name: Run migrations
      run: uv run python manage.py migrate
    - name: Collect static files
      run: uv run python manage.py collectstatic
    - name: Run tests
      run: uv run coverage run --source="." -m pytest
    - name: Produce coverage.xml
      run: uv run coverage xml
