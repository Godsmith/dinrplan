name: Black
on: [push]
jobs:
  black:
    name: Black
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python 3.13
      uses: actions/setup-python@v1
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        pip install uv
        uv sync
    - name: Run black
      run: uv run black --check .
